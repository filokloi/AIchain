name: Validate

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (core runtime)
        run: >-
          python -m py_compile
          aichaind/main.py
          aichaind/core/*.py
          aichaind/routing/*.py
          aichaind/security/*.py
          aichaind/providers/*.py
          aichaind/providers/adapters/*.py
          aichaind/telemetry/*.py
          aichaind/transport/*.py
          openclaw-skill/skill.py
          tools/arbitrator.py
          tools/build_catalog_manifest.py
          tools/verify_dashboard_release.py
          tools/verify_live_dashboard.py
          tools/verify_local_execution.py

      - name: Validate JSON files
        run: |
          python - << 'PY'
          import json,glob,sys
          files = glob.glob('*.json') + glob.glob('config/*.json')
          bad=[]
          for f in files:
              try:
                  with open(f,'r',encoding='utf-8') as fh:
                      json.load(fh)
              except Exception as e:
                  bad.append((f,str(e)))
          if bad:
              for f,e in bad:
                  print(f'INVALID JSON: {f}: {e}')
              sys.exit(1)
          print('All JSON files valid')
          PY

      - name: Run focused regression tests
        run: >-
          python -m pytest
          tests/test_catalog_contract.py
          tests/test_catalog_manifest_builder.py
          tests/test_site_backend_pipeline.py
          tests/test_dashboard_cutover.py
          tests/test_http_server_enforcement.py
          tests/test_local_adapter.py
          tests/test_operational_verifiers.py
          tests/test_injection_guard.py
          tests/test_output_validation.py
          tests/test_policy.py


