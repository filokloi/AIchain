name: Validate

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (root)
        run: python -m py_compile arbitrator.py aichain_bridge.py debug_sync.py

      - name: Python syntax check (skill)
        run: python -m py_compile ai-chain-skill/aichain.py ai-chain-skill/scripts/*.py ai-chain-skill/providers/*.py

      - name: Validate JSON files
        run: |
          python - << 'PY'
          import json,glob,sys
          files = glob.glob('*.json') + glob.glob('ai-chain-skill/*.json')
          bad=[]
          for f in files:
              try:
                  with open(f,'r',encoding='utf-8') as fh:
                      json.load(fh)
              except Exception as e:
                  bad.append((f,str(e)))
          if bad:
              for f,e in bad:
                  print(f'INVALID JSON: {f}: {e}')
              sys.exit(1)
          print('All JSON files valid')
          PY
