name: "AIchain — Intelligence Arbitration Cycle"

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  arbitrate:
    name: "Global Model Arbitration"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: >-
          python -m pytest
          tests/test_arbitrator.py
          tests/test_catalog_manifest_builder.py
          tests/test_catalog_contract.py
          tests/test_site_backend_pipeline.py
          tests/test_dashboard_cutover.py

      - name: Run arbitrator
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_KEY }}
          ARTIFICIAL_ANALYSIS_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_KEY }}
        run: |
          python tools/arbitrator.py
          python tools/build_catalog_manifest.py

      - name: Verify dashboard cutover release contract
        run: python tools/verify_dashboard_release.py

      - name: Upload ingestion snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aichain-source-snapshots
          path: artifacts/source_snapshots
          if-no-files-found: warn
          retention-days: 7

      - name: Commit and push updated routing table
        run: |
          git config user.name "AIchain Bot"
          git config user.email "aichain-bot@users.noreply.github.com"
          git add ai_routing_table.json catalog_manifest.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update global routing table [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
          else
            echo "No changes to routing table — skipping commit."
          fi

